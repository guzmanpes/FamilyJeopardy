<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>Jeopardy Player</title><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script><script src="firebase-config.js"></script><style>*{box-sizing:border-box}body{margin:0;font-family:Arial;background:#06145d;color:#fff;min-height:100vh}.wrap{max-width:900px;margin:auto;padding:16px}h1{text-align:center}.card{background:#fff;color:#111;border-radius:16px;padding:16px;box-shadow:0 8px 24px #0005}.join{display:grid;gap:10px}input,button{font:inherit;padding:13px;border-radius:10px;border:1px solid #9aa6d1}button{font-weight:900;border:0}.primary{background:#ffd84d}.secondary{background:#dce5ff;color:#07135f}.danger{background:#ff6b6b}.session{text-align:center;color:#ffd84d;font-weight:900;margin-bottom:8px}.prompt{font-size:clamp(1.3rem,4vw,2.3rem);font-weight:900;text-align:center;margin:10px 0 14px}.canvas-wrap{background:#fff;border:4px solid #111;border-radius:12px;overflow:hidden;touch-action:none}canvas{display:block;width:100%;height:420px;background:#fff;touch-action:none}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.toolbar button{flex:1;min-width:120px}.status{text-align:center;font-weight:800;margin-top:10px;min-height:24px}.wait{text-align:center;padding:50px 15px;font-size:1.35rem;font-weight:800}.hidden{display:none}</style></head><body><div class="wrap"><h1>Jeopardy Player</h1><div class="session">Session: <span id="sessionText"></span></div><div class="card" id="joinCard"><div class="join"><label><strong>Your name</strong></label><input id="nameInput" maxlength="24" placeholder="Enter your name"><button class="primary" id="joinBtn">Join Game</button></div></div><div class="card hidden" id="gameCard"><div id="waiting" class="wait">Waiting for the host to open a question…</div><div id="answerArea" class="hidden"><div class="prompt" id="promptText"></div><div class="canvas-wrap"><canvas id="canvas"></canvas></div><div class="toolbar"><button class="secondary" id="undoBtn">Undo</button><button class="danger" id="clearBtn">Clear</button><button class="primary" id="submitBtn">Submit Response</button></div><div class="status" id="statusText"></div></div></div></div><script>(()=>{const p=new URLSearchParams(location.search),sessionCode=(p.get("session")||"").toUpperCase();sessionText.textContent=sessionCode||"Missing";if(!window.FIREBASE_CONFIG||String(window.FIREBASE_CONFIG.apiKey||"").includes("PASTE_")){alert("Firebase is not configured by the host.");return}if(!sessionCode){alert("Missing session code.");return}if(!firebase.apps.length)firebase.initializeApp(window.FIREBASE_CONFIG);const db=firebase.database(),sessionRef=db.ref(`sessions/${sessionCode}`);let playerId=localStorage.jeopardyPlayerId||("p_"+Math.random().toString(36).slice(2)+Date.now().toString(36));localStorage.jeopardyPlayerId=playerId;let playerName=localStorage.jeopardyPlayerName||"",currentClueId="",joined=false;const canvas=document.getElementById("canvas"),ctx=canvas.getContext("2d");let drawing=false,strokes=[],currentStroke=[];function sizeCanvas(){const r=canvas.getBoundingClientRect(),d=Math.min(devicePixelRatio,2);canvas.width=Math.max(600,Math.floor(r.width*d));canvas.height=Math.floor(420*d);ctx.lineCap="round";ctx.lineJoin="round";ctx.lineWidth=7*d;redraw()}function point(e){const r=canvas.getBoundingClientRect(),t=e.touches?.[0]||e.changedTouches?.[0]||e;return{x:(t.clientX-r.left)*(canvas.width/r.width),y:(t.clientY-r.top)*(canvas.height/r.height)}}function begin(e){e.preventDefault();drawing=true;currentStroke=[point(e)]}function move(e){if(!drawing)return;e.preventDefault();const n=point(e),a=currentStroke.at(-1);currentStroke.push(n);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(n.x,n.y);ctx.stroke()}function end(e){if(!drawing)return;e.preventDefault();drawing=false;if(currentStroke.length)strokes.push(currentStroke);currentStroke=[]}function redraw(){ctx.fillStyle="#fff";ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle="#111";for(const s of strokes){if(s.length<2)continue;ctx.beginPath();ctx.moveTo(s[0].x,s[0].y);for(const q of s.slice(1))ctx.lineTo(q.x,q.y);ctx.stroke()}}function clearCanvas(){strokes=[];redraw()}for(const ev of ["pointerdown","mousedown","touchstart"])canvas.addEventListener(ev,begin,{passive:false});for(const ev of ["pointermove","mousemove","touchmove"])canvas.addEventListener(ev,move,{passive:false});for(const ev of ["pointerup","pointercancel","mouseup","mouseleave","touchend"])canvas.addEventListener(ev,end,{passive:false});undoBtn.onclick=()=>{strokes.pop();redraw()};clearBtn.onclick=clearCanvas;joinBtn.onclick=async()=>{playerName=nameInput.value.trim();if(!playerName){alert("Enter your name first.");return}localStorage.jeopardyPlayerName=playerName;const s=await sessionRef.child("active").once("value");if(!s.val()){alert("That session is not active.");return}joined=true;await sessionRef.child(`players/${playerId}`).set({name:playerName,joinedAt:firebase.database.ServerValue.TIMESTAMP});sessionRef.child(`players/${playerId}`).onDisconnect().remove();joinCard.classList.add("hidden");gameCard.classList.remove("hidden");sizeCanvas();listen()};if(playerName)nameInput.value=playerName;function listen(){sessionRef.child("currentClue").on("value",s=>{const c=s.val();if(!c){waiting.classList.remove("hidden");answerArea.classList.add("hidden");return}if(c.id!==currentClueId){currentClueId=c.id;clearCanvas();statusText.textContent=""}promptText.textContent=`${c.category} $${c.value}: ${c.prompt}`;waiting.classList.add("hidden");answerArea.classList.remove("hidden");setTimeout(sizeCanvas,50)});sessionRef.child("active").on("value",s=>{if(s.val()===false){waiting.textContent="The host ended this session.";waiting.classList.remove("hidden");answerArea.classList.add("hidden")}})}submitBtn.onclick=async()=>{if(!joined||!currentClueId)return;if(!strokes.length&&!confirm("Your response is blank. Submit anyway?"))return;statusText.textContent="Submitting…";await sessionRef.child(`responses/${playerId}`).set({playerName,clueId:currentClueId,imageData:canvas.toDataURL("image/jpeg",.72),submittedAt:firebase.database.ServerValue.TIMESTAMP});statusText.textContent="Submitted! You can revise and submit again."};addEventListener("resize",()=>setTimeout(sizeCanvas,100))})();</script></body></html>
